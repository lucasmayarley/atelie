<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Clientes — Ateliê</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .cliente-card { display: flex; align-items: center; gap: 12px; }
    .cliente-info { flex: 1; min-width: 0; }
    .cliente-nome { font-size: 15px; font-weight: 500; }
    .cliente-meta { font-size: 12px; color: var(--texto-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .cliente-status { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .pedidos-count { font-size: 11px; color: var(--texto-3); }

    /* Perfil */
    .perfil-hero { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .perfil-dados { flex: 1; }
    .perfil-nome { font-family: var(--fonte-titulo); font-size: 20px; }
    .perfil-congregacao { font-size: 13px; color: var(--texto-2); margin-top: 2px; }
    .perfil-tel { font-size: 13px; color: var(--verde); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

    .tabs { display: flex; border-bottom: 1px solid var(--cinza-borda); margin-bottom: 16px; gap: 0; }
    .tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 13px; font-weight: 500; color: var(--texto-3); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
    .tab.ativo { color: var(--verde); border-bottom-color: var(--verde); }
    .aba { display: none; }
    .aba.ativa { display: block; }

    /* Medida visualização */
    .medida-view { background: var(--cinza-light); border-radius: var(--radius); padding: 10px; border: 1px solid var(--cinza-borda); }
    .medida-view-nome { font-size: 11px; color: var(--texto-2); font-weight: 500; margin-bottom: 6px; }
    .medida-view-vals { display: flex; gap: 8px; }
    .medida-view-val { flex: 1; text-align: center; }
    .medida-view-val strong { display: block; font-size: 15px; color: var(--texto); }
    .medida-view-val span { font-size: 10px; color: var(--texto-3); }

    /* Histórico pedidos */
    .hist-item { padding: 10px 0; border-bottom: 1px solid var(--cinza-borda); }
    .hist-item:last-child { border-bottom: none; }
    .hist-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .hist-peca { font-size: 14px; font-weight: 500; }
    .hist-data { font-size: 11px; color: var(--texto-3); }
    .hist-desc { font-size: 12px; color: var(--texto-2); }

    /* Festividades */
    .fest-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--cinza-borda); }
    .fest-item:last-child { border-bottom: none; }
    .fest-mes { width: 40px; height: 40px; border-radius: var(--radius); background: var(--verde-light); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--verde-dark); text-align: center; flex-shrink: 0; }
    .fest-info { flex: 1; }
    .fest-desc { font-size: 14px; font-weight: 500; }
    .fest-data { font-size: 12px; color: var(--texto-2); }

    /* Form medidas em sheet */
    .medida-form-item { background: var(--cinza-light); border-radius: var(--radius); padding: 10px; border: 1px solid var(--cinza-borda); }
    .medida-form-nome { font-size: 11px; color: var(--texto-2); font-weight: 500; margin-bottom: 6px; }
    .medida-form-par { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .medida-form-sub { font-size: 10px; color: var(--texto-3); text-align: center; margin-top: 2px; }
  </style>
</head>
<body>

<!-- TELA: LISTA -->
<div id="tela-lista">
  <div class="page-header">
    <div style="flex:1">
      <h1>Clientes</h1>
    </div>
  </div>
  <div class="page">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" placeholder="Buscar por nome ou congregação..." id="input-busca" oninput="filtrar()">
    </div>
    <div class="filtros">
      <button class="filtro-btn ativo" data-f="todas" onclick="setFiltro(this)">Todas</button>
      <button class="filtro-btn" data-f="ativa" onclick="setFiltro(this)">Ativas</button>
      <button class="filtro-btn" data-f="morna" onclick="setFiltro(this)">Mornas</button>
      <button class="filtro-btn" data-f="inativa" onclick="setFiltro(this)">Inativas</button>
    </div>
    <div id="lista-clientes"></div>
    <div id="empty-clientes" class="empty" style="display:none">
      <div class="empty-icon">👗</div>
      <p>Nenhuma cliente encontrada.<br>Toque no + para cadastrar.</p>
    </div>
  </div>
  <button class="fab" onclick="abrirNovaCliente()">+</button>
</div>

<!-- TELA: PERFIL -->
<div id="tela-perfil" style="display:none">
  <div class="page-header">
    <button class="btn btn-ghost btn-sm" onclick="voltarLista()">← Voltar</button>
    <h1 style="flex:1;font-size:16px;" id="perfil-titulo">Cliente</h1>
    <button class="btn btn-sm" onclick="editarCliente()">Editar</button>
  </div>
  <div class="page">
    <div class="perfil-hero">
      <div class="avatar avatar-lg" id="perfil-avatar"></div>
      <div class="perfil-dados">
        <div class="perfil-nome" id="perfil-nome"></div>
        <div class="perfil-congregacao" id="perfil-congregacao"></div>
        <div class="perfil-tel" id="perfil-tel"></div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab ativo" onclick="abaAtiva('medidas', this)">Medidas</div>
      <div class="tab" onclick="abaAtiva('pedidos', this)">Pedidos</div>
      <div class="tab" onclick="abaAtiva('festividades', this)">Festividades</div>
      <div class="tab" onclick="abaAtiva('obs', this)">Obs.</div>
    </div>

    <div id="aba-medidas" class="aba ativa">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span style="font-size:12px;color:var(--texto-3);" id="data-medidas"></span>
        <button class="btn btn-sm btn-primary" onclick="abrirEdicaoMedidas()">Atualizar medidas</button>
      </div>
      <div class="medidas-grid" id="perfil-medidas-grid"></div>
    </div>

    <div id="aba-pedidos" class="aba">
      <div id="perfil-pedidos-lista"></div>
    </div>

    <div id="aba-festividades" class="aba">
      <div id="perfil-festividades-lista"></div>
      <button class="btn btn-full" style="margin-top:10px" onclick="abrirAddFestividade()">+ Adicionar festividade</button>
    </div>

    <div id="aba-obs" class="aba">
      <div style="font-size:14px;color:var(--texto);line-height:1.7;padding:8px 0;" id="perfil-obs"></div>
    </div>
  </div>
</div>

<!-- SHEET: NOVA/EDITAR CLIENTE -->
<div class="sheet-overlay" id="sheet-cliente">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-titulo" id="sheet-cliente-titulo">Nova cliente</div>

    <div class="section-label">Dados pessoais</div>
    <div class="form-group">
      <label class="form-label">Nome completo <span class="req">*</span></label>
      <input type="text" id="f-nome" placeholder="Nome da cliente">
    </div>
    <div class="form-group">
      <label class="form-label">Telefone / WhatsApp</label>
      <input type="tel" id="f-tel" placeholder="(81) 99999-9999">
    </div>
    <div class="form-group">
      <label class="form-label">Congregação / Igreja</label>
      <input type="text" id="f-congregacao" placeholder="Nome da igreja">
    </div>
    <div class="form-group">
      <label class="form-label">Observações</label>
      <textarea id="f-obs" placeholder="Preferências de estilo, cores, observações gerais..."></textarea>
    </div>

    <div class="section-label">Medidas (cm) — Total / Metade</div>
    <div class="medidas-grid" id="form-medidas-grid"></div>

    <div style="height:16px"></div>
    <button class="btn btn-primary btn-full" onclick="salvarCliente()">Salvar cliente</button>
    <button class="btn btn-full btn-ghost" onclick="fecharSheet('sheet-cliente')" style="margin-top:6px">Cancelar</button>
    <div style="height:16px"></div>
  </div>
</div>

<!-- SHEET: ADICIONAR FESTIVIDADE -->
<div class="sheet-overlay" id="sheet-festividade">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-titulo">Festividade do grupo</div>
    <div class="form-group">
      <label class="form-label">Mês <span class="req">*</span></label>
      <select id="fest-mes">
        <option value="">Selecione...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Descrição <span class="req">*</span></label>
      <input type="text" id="fest-desc" placeholder="Ex: Congresso de Mulheres da Igreja">
    </div>
    <div class="form-group">
      <label class="form-label">Data aproximada</label>
      <input type="date" id="fest-data">
    </div>
    <button class="btn btn-primary btn-full" onclick="salvarFestividade()">Salvar</button>
    <button class="btn btn-full btn-ghost" onclick="fecharSheet('sheet-festividade')" style="margin-top:6px">Cancelar</button>
  </div>
</div>

<nav id="navbar"></nav>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  let todosClientes = [];
  let todosPedidos = [];
  let clienteAtualIdx = null;
  let filtroAtivo = 'todas';
  let editandoCliente = null;

  // ---- INIT ----
  protegerPagina(async () => {
    renderNav('clientes');
    preencherMeses();
    await carregarDados();
  });

  async function carregarDados() {
    loading(true, 'Carregando clientes...');
    try {
      todosClientes = await lerAba(CONFIG.ABAS.CLIENTES);
      todosPedidos  = await lerAba(CONFIG.ABAS.PEDIDOS);
      renderLista();
    } finally { loading(false); }
  }

  // ---- LISTA ----
  function filtrar() { renderLista(); }
  function setFiltro(el) {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
    el.classList.add('ativo');
    filtroAtivo = el.dataset.f;
    renderLista();
  }

  function ultimoPedido(clienteID) {
    const pedidos = todosPedidos.filter(p => p.ClienteID === clienteID && p.Status !== 'entregue');
    if (!pedidos.length) {
      const todos = todosPedidos.filter(p => p.ClienteID === clienteID);
      if (!todos.length) return null;
      return todos.sort((a,b) => new Date(b.DataCriacao) - new Date(a.DataCriacao))[0].DataCriacao;
    }
    return pedidos.sort((a,b) => new Date(b.DataCriacao) - new Date(a.DataCriacao))[0].DataCriacao;
  }

  function renderLista() {
    const busca = document.getElementById('input-busca').value.toLowerCase();
    let lista = todosClientes.filter(c => {
      if (!c.Nome) return false;
      const matchBusca = !busca || c.Nome.toLowerCase().includes(busca) || (c.Congregacao||'').toLowerCase().includes(busca);
      if (!matchBusca) return false;
      if (filtroAtivo === 'todas') return true;
      const s = statusCliente(ultimoPedido(c.ID));
      return s.classe === 'status-' + filtroAtivo;
    });

    const el = document.getElementById('lista-clientes');
    const empty = document.getElementById('empty-clientes');
    if (!lista.length) { el.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    el.innerHTML = lista.map((c, i) => {
      const up = ultimoPedido(c.ID);
      const st = statusCliente(up);
      const nPedidos = todosPedidos.filter(p => p.ClienteID === c.ID).length;
      return `<div class="card card-clickable cliente-card" onclick="verPerfil('${c.ID}')">
        <div class="avatar avatar-md">${iniciais(c.Nome)}</div>
        <div class="cliente-info">
          <div class="cliente-nome">${c.Nome}</div>
          <div class="cliente-meta">${c.Congregacao || 'Sem congregação'} · ${c.Telefone || 'Sem telefone'}</div>
        </div>
        <div class="cliente-status">
          <span class="badge ${st.classe}">${st.label}</span>
          <span class="pedidos-count">${nPedidos} pedido${nPedidos !== 1 ? 's' : ''}</span>
        </div>
      </div>`;
    }).join('');
  }

  // ---- PERFIL ----
  async function verPerfil(id) {
    const c = todosClientes.find(x => x.ID === id);
    if (!c) return;
    clienteAtualIdx = id;

    document.getElementById('perfil-titulo').textContent = c.Nome;
    document.getElementById('perfil-avatar').textContent = iniciais(c.Nome);
    document.getElementById('perfil-nome').textContent = c.Nome;
    document.getElementById('perfil-congregacao').textContent = c.Congregacao || 'Sem congregação';
    document.getElementById('perfil-tel').innerHTML = c.Telefone
      ? `<a href="tel:${c.Telefone}" style="color:var(--verde);text-decoration:none">📞 ${c.Telefone}</a>` : '';
    document.getElementById('perfil-obs').textContent = c.Observacoes || 'Nenhuma observação.';
    document.getElementById('data-medidas').textContent = c.DataAtualizacaoMedidas
      ? `Medidas de ${fmtData(c.DataAtualizacaoMedidas)}` : 'Medidas não cadastradas';

    renderMedidasPerfil(c);
    await renderPedidosPerfil(id);
    await renderFestividadesPerfil(id);
    abaAtiva('medidas', document.querySelector('.tab'));

    document.getElementById('tela-lista').style.display = 'none';
    document.getElementById('tela-perfil').style.display = 'block';
  }

  function renderMedidasPerfil(c) {
    const grid = document.getElementById('perfil-medidas-grid');
    grid.innerHTML = MEDIDAS.map(m => {
      const k = m.replace(/\s+/g, '_');
      const t = c[k + '_total'] || '—';
      const me = c[k + '_metade'] || '—';
      return `<div class="medida-view">
        <div class="medida-view-nome">${m}</div>
        <div class="medida-view-vals">
          <div class="medida-view-val"><strong>${t}</strong><span>total</span></div>
          <div class="medida-view-val"><strong>${me}</strong><span>metade</span></div>
        </div>
      </div>`;
    }).join('');
  }

  async function renderPedidosPerfil(clienteID) {
    const el = document.getElementById('perfil-pedidos-lista');
    const pedidos = todosPedidos.filter(p => p.ClienteID === clienteID)
      .sort((a,b) => new Date(b.DataCriacao) - new Date(a.DataCriacao));
    if (!pedidos.length) {
      el.innerHTML = '<div class="empty"><p>Nenhum pedido registrado.</p></div>'; return;
    }
    el.innerHTML = pedidos.map(p => `
      <div class="hist-item">
        <div class="hist-top">
          <div class="hist-peca">${p.TipoPeca || p.TipoFarda || '—'}</div>
          ${badgePedido(p.Status)}
        </div>
        <div class="hist-desc">${p.Descricao || ''}</div>
        <div class="hist-data">${fmtData(p.DataCriacao)} · ${badgePagamento(p.StatusPagamento || 'pendente')}</div>
      </div>`).join('');
  }

  async function renderFestividadesPerfil(clienteID) {
    const el = document.getElementById('perfil-festividades-lista');
    loading(true, 'Carregando festividades...');
    try {
      const todas = await lerAba(CONFIG.ABAS.FESTIVIDADES);
      const festas = todas.filter(f => f.ClienteID === clienteID || f.GrupoID === clienteID);
      if (!festas.length) {
        el.innerHTML = '<div class="empty"><p>Nenhuma festividade registrada.</p></div>'; return;
      }
      el.innerHTML = festas.map(f => `
        <div class="fest-item">
          <div class="fest-mes">${(MESES[parseInt(f.Mes||1)-1]||'').slice(0,3).toUpperCase()}</div>
          <div class="fest-info">
            <div class="fest-desc">${f.Descricao}</div>
            <div class="fest-data">${f.Data ? fmtData(f.Data) : 'Data não definida'}</div>
          </div>
        </div>`).join('');
    } finally { loading(false); }
  }

  function voltarLista() {
    document.getElementById('tela-perfil').style.display = 'none';
    document.getElementById('tela-lista').style.display = 'block';
  }

  function abaAtiva(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
    document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
    if (el) el.classList.add('ativo');
    document.getElementById('aba-' + id).classList.add('ativa');
  }

  // ---- FORM CLIENTE ----
  function buildFormMedidas(cliente) {
    return MEDIDAS.map(m => {
      const k = m.replace(/\s+/g, '_');
      const vt = cliente ? (cliente[k + '_total'] || '') : '';
      const vm = cliente ? (cliente[k + '_metade'] || '') : '';
      return `<div class="medida-form-item">
        <div class="medida-form-nome">${m}</div>
        <div class="medida-form-par">
          <div>
            <input type="number" step="0.5" placeholder="0" value="${vt}" id="m-${k}-t" style="width:100%;padding:5px 7px;border-radius:6px;border:1px solid var(--cinza-borda);font-size:12px;background:var(--bg-card);color:var(--texto)">
            <div class="medida-form-sub">total</div>
          </div>
          <div>
            <input type="number" step="0.5" placeholder="0" value="${vm}" id="m-${k}-me" style="width:100%;padding:5px 7px;border-radius:6px;border:1px solid var(--cinza-borda);font-size:12px;background:var(--bg-card);color:var(--texto)">
            <div class="medida-form-sub">metade</div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function abrirNovaCliente() {
    editandoCliente = null;
    document.getElementById('sheet-cliente-titulo').textContent = 'Nova cliente';
    document.getElementById('f-nome').value = '';
    document.getElementById('f-tel').value = '';
    document.getElementById('f-congregacao').value = '';
    document.getElementById('f-obs').value = '';
    document.getElementById('form-medidas-grid').innerHTML = buildFormMedidas(null);
    abrirSheet('sheet-cliente');
  }

  function editarCliente() {
    const c = todosClientes.find(x => x.ID === clienteAtualIdx);
    if (!c) return;
    editandoCliente = c;
    document.getElementById('sheet-cliente-titulo').textContent = 'Editar cliente';
    document.getElementById('f-nome').value = c.Nome;
    document.getElementById('f-tel').value = c.Telefone || '';
    document.getElementById('f-congregacao').value = c.Congregacao || '';
    document.getElementById('f-obs').value = c.Observacoes || '';
    document.getElementById('form-medidas-grid').innerHTML = buildFormMedidas(c);
    abrirSheet('sheet-cliente');
  }

  function abrirEdicaoMedidas() { editarCliente(); }

  async function salvarCliente() {
    const nome = document.getElementById('f-nome').value.trim();
    if (!nome) { toast('Informe o nome da cliente', 'erro'); return; }

    const medidas = {};
    MEDIDAS.forEach(m => {
      const k = m.replace(/\s+/g, '_');
      medidas[k + '_total']  = document.getElementById('m-' + k + '-t')?.value || '';
      medidas[k + '_metade'] = document.getElementById('m-' + k + '-me')?.value || '';
    });

    loading(true, 'Salvando...');
    try {
      if (editandoCliente) {
        const obj = { ...editandoCliente, Nome: nome,
          Telefone: document.getElementById('f-tel').value,
          Congregacao: document.getElementById('f-congregacao').value,
          Observacoes: document.getElementById('f-obs').value,
          DataAtualizacaoMedidas: hoje(), ...medidas };
        await atualizarLinha(CONFIG.ABAS.CLIENTES, obj);
        toast('Cliente atualizada!');
      } else {
        const obj = { ID: gerarID(), Nome: nome,
          Telefone: document.getElementById('f-tel').value,
          Congregacao: document.getElementById('f-congregacao').value,
          Observacoes: document.getElementById('f-obs').value,
          DataCriacao: hoje(), DataAtualizacaoMedidas: hoje(), ...medidas };
        await adicionarLinha(CONFIG.ABAS.CLIENTES, obj);
        toast('Cliente cadastrada!');
      }
      fecharSheet('sheet-cliente');
      await carregarDados();
      if (editandoCliente) verPerfil(editandoCliente.ID);
    } catch(e) { toast('Erro ao salvar. Tente novamente.', 'erro'); console.error(e); }
    finally { loading(false); }
  }

  // ---- FESTIVIDADES ----
  function preencherMeses() {
    const sel = document.getElementById('fest-mes');
    MESES.forEach((m, i) => { sel.innerHTML += `<option value="${i+1}">${m}</option>`; });
  }

  function abrirAddFestividade() { abrirSheet('sheet-festividade'); }

  async function salvarFestividade() {
    const mes = document.getElementById('fest-mes').value;
    const desc = document.getElementById('fest-desc').value.trim();
    if (!mes || !desc) { toast('Preencha mês e descrição', 'erro'); return; }
    loading(true, 'Salvando...');
    try {
      await adicionarLinha(CONFIG.ABAS.FESTIVIDADES, {
        ID: gerarID(), ClienteID: clienteAtualIdx, GrupoID: '',
        Mes: mes, Descricao: desc, Data: document.getElementById('fest-data').value,
        DataCriacao: hoje()
      });
      toast('Festividade registrada!');
      fecharSheet('sheet-festividade');
      renderFestividadesPerfil(clienteAtualIdx);
    } catch(e) { toast('Erro ao salvar', 'erro'); }
    finally { loading(false); }
  }

  // ---- SHEETS UTILS ----
  function abrirSheet(id) { document.getElementById(id).classList.add('aberto'); }
  function fecharSheet(id) { document.getElementById(id).classList.remove('aberto'); }
  document.querySelectorAll('.sheet-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('aberto'); });
  });
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
</body>
</html>
