<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Financeiro — Ateliê</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .mes-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .mes-nav button { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--texto-2); padding: 4px 10px; }
    .mes-titulo { font-family: var(--fonte-titulo); font-size: 18px; font-weight: 500; }
    .resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .resumo-card { background: var(--bg-card); border: 1px solid var(--cinza-borda); border-radius: var(--radius-lg); padding: 14px; }
    .resumo-val { font-size: 20px; font-weight: 600; font-family: var(--fonte-titulo); }
    .resumo-label { font-size: 11px; color: var(--texto-3); margin-top: 4px; }
    .resumo-full { grid-column: 1 / -1; background: var(--verde-light); border-color: rgba(29,158,117,0.2); }
    .resumo-full .resumo-val { color: var(--verde-dark); font-size: 24px; }

    .mov-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--cinza-borda); }
    .mov-item:last-child { border-bottom: none; }
    .mov-icon { width: 36px; height: 36px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .mov-icon-entrada { background: var(--verde-light); }
    .mov-icon-saida { background: var(--verm-light); }
    .mov-info { flex: 1; }
    .mov-desc { font-size: 14px; font-weight: 500; }
    .mov-meta { font-size: 11px; color: var(--texto-3); margin-top: 2px; }
    .mov-val { font-size: 15px; font-weight: 600; }
    .mov-val-pos { color: var(--verde-dark); }
    .mov-val-neg { color: var(--vermelho); }

    .tabs { display: flex; border-bottom: 1px solid var(--cinza-borda); margin-bottom: 16px; }
    .tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 13px; font-weight: 500; color: var(--texto-3); border-bottom: 2px solid transparent; cursor: pointer; }
    .tab.ativo { color: var(--verde); border-bottom-color: var(--verde); }
    .aba { display: none; }
    .aba.ativa { display: block; }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Financeiro</h1>
</div>
<div class="page">
  <div class="mes-nav">
    <button onclick="mudarMes(-1)">‹</button>
    <div class="mes-titulo" id="mes-titulo"></div>
    <button onclick="mudarMes(1)">›</button>
  </div>

  <div class="resumo-grid" id="resumo-grid">
    <div class="resumo-card"><div class="resumo-val" id="res-receita">—</div><div class="resumo-label">Receita</div></div>
    <div class="resumo-card"><div class="resumo-val" id="res-custo">—</div><div class="resumo-label">Custos</div></div>
    <div class="resumo-card resumo-full"><div class="resumo-val" id="res-lucro">—</div><div class="resumo-label">Lucro do mês</div></div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div style="font-size:13px;font-weight:500;color:var(--texto-2);" id="contagem-pedidos"></div>
  </div>

  <div class="tabs">
    <div class="tab ativo" onclick="abaAtiva('entradas', this)">Entradas</div>
    <div class="tab" onclick="abaAtiva('saidas', this)">Saídas</div>
  </div>

  <div id="aba-entradas" class="aba ativa">
    <div id="lista-entradas"></div>
  </div>
  <div id="aba-saidas" class="aba">
    <div id="lista-saidas"></div>
    <button class="btn btn-full" style="margin-top:12px" onclick="abrirAddSaida()">+ Registrar gasto avulso</button>
  </div>
</div>

<!-- SHEET: NOVA SAÍDA -->
<div class="sheet-overlay" id="sheet-saida">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-titulo">Gasto avulso</div>
    <div class="form-group">
      <label class="form-label">Descrição <span class="req">*</span></label>
      <input type="text" id="s-desc" placeholder="Ex: Linha, zíper, embalagem...">
    </div>
    <div class="form-group">
      <label class="form-label">Valor (R$) <span class="req">*</span></label>
      <input type="number" id="s-valor" step="0.5" placeholder="0,00">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" id="s-data">
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select id="s-categoria">
          <option value="material">Material</option>
          <option value="ferramenta">Ferramenta</option>
          <option value="energia">Energia</option>
          <option value="transporte">Transporte</option>
          <option value="outro">Outro</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="salvarSaida()">Registrar</button>
    <button class="btn btn-full btn-ghost" onclick="fecharSheet('sheet-saida')" style="margin-top:6px">Cancelar</button>
  </div>
</div>

<nav id="navbar"></nav>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  let mesSel = new Date().getMonth();
  let anoSel = new Date().getFullYear();
  let todosPagamentos = [], todasSaidas = [], todosPedidos = [], todosClientes = [], todosGrupos = [];

  protegerPagina(async () => {
    renderNav('financeiro');
    await carregarDados();
  });

  async function carregarDados() {
    loading(true, 'Carregando financeiro...');
    try {
      [todosPagamentos, todasSaidas, todosPedidos, todosClientes, todosGrupos] = await Promise.all([
        lerAba(CONFIG.ABAS.PAGAMENTOS),
        lerAba(CONFIG.ABAS.FINANCEIRO_SAIDAS),
        lerAba(CONFIG.ABAS.PEDIDOS),
        lerAba(CONFIG.ABAS.CLIENTES),
        lerAba(CONFIG.ABAS.GRUPOS)
      ]);
      renderMes();
    } finally { loading(false); }
  }

  function mudarMes(delta) {
    mesSel += delta;
    if (mesSel > 11) { mesSel = 0; anoSel++; }
    if (mesSel < 0) { mesSel = 11; anoSel--; }
    renderMes();
  }

  function dentroDomes(dataStr) {
    if (!dataStr) return false;
    const d = new Date(dataStr);
    return d.getMonth() === mesSel && d.getFullYear() === anoSel;
  }

  function nomePedido(p) {
    if (!p) return 'Pedido';
    if (p.Tipo === 'grupo') return todosGrupos.find(g => g.ID === p.GrupoID)?.Nome || 'Grupo';
    return todosClientes.find(c => c.ID === p.ClienteID)?.Nome || 'Cliente';
  }

  function renderMes() {
    document.getElementById('mes-titulo').textContent = MESES[mesSel] + ' ' + anoSel;

    const entradas = todosPagamentos.filter(pg => dentroDomes(pg.Data));
    const saidas = todasSaidas.filter(s => dentroDomes(s.Data));
    const receita = entradas.reduce((sum, pg) => sum + parseFloat(pg.Valor || 0), 0);
    const custos = saidas.reduce((sum, s) => sum + parseFloat(s.Valor || 0), 0);
    const lucro = receita - custos;

    document.getElementById('res-receita').textContent = fmtReais(receita);
    document.getElementById('res-custo').textContent = fmtReais(custos);
    document.getElementById('res-lucro').textContent = fmtReais(lucro);
    document.getElementById('res-lucro').style.color = lucro >= 0 ? 'var(--verde-dark)' : 'var(--vermelho)';

    const pedidosDoMes = new Set(entradas.map(e => e.PedidoID));
    document.getElementById('contagem-pedidos').textContent = `${pedidosDoMes.size} pedido${pedidosDoMes.size !== 1 ? 's' : ''} com recebimento no mês`;

    // Entradas
    const elEnt = document.getElementById('lista-entradas');
    if (!entradas.length) { elEnt.innerHTML = '<div class="empty"><p>Nenhuma entrada registrada neste mês.</p></div>'; }
    else elEnt.innerHTML = entradas.sort((a,b) => new Date(b.Data) - new Date(a.Data)).map(pg => {
      const p = todosPedidos.find(x => x.ID === pg.PedidoID);
      return `<div class="mov-item">
        <div class="mov-icon mov-icon-entrada">💚</div>
        <div class="mov-info">
          <div class="mov-desc">${nomePedido(p)}</div>
          <div class="mov-meta">${fmtData(pg.Data)} · ${pg.Forma || '—'} ${pg.Observacoes ? '· ' + pg.Observacoes : ''}</div>
        </div>
        <div class="mov-val mov-val-pos">+${fmtReais(pg.Valor)}</div>
      </div>`;
    }).join('');

    // Saídas
    const elSai = document.getElementById('lista-saidas');
    if (!saidas.length) { elSai.innerHTML = '<div class="empty"><p>Nenhuma saída neste mês.</p></div>'; }
    else elSai.innerHTML = saidas.sort((a,b) => new Date(b.Data) - new Date(a.Data)).map(s => {
      const p = s.PedidoID ? todosPedidos.find(x => x.ID === s.PedidoID) : null;
      return `<div class="mov-item">
        <div class="mov-icon mov-icon-saida">🔴</div>
        <div class="mov-info">
          <div class="mov-desc">${s.Descricao || '—'}</div>
          <div class="mov-meta">${fmtData(s.Data)} · ${s.Categoria || '—'} ${p ? '· ' + nomePedido(p) : ''}</div>
        </div>
        <div class="mov-val mov-val-neg">-${fmtReais(s.Valor)}</div>
      </div>`;
    }).join('');
  }

  function abrirAddSaida() {
    document.getElementById('s-data').value = hoje();
    document.getElementById('s-desc').value = '';
    document.getElementById('s-valor').value = '';
    abrirSheet('sheet-saida');
  }

  async function salvarSaida() {
    const desc = document.getElementById('s-desc').value.trim();
    const valor = parseFloat(document.getElementById('s-valor').value);
    if (!desc) { toast('Informe a descrição', 'erro'); return; }
    if (!valor || valor <= 0) { toast('Informe o valor', 'erro'); return; }
    loading(true, 'Registrando...');
    try {
      await adicionarLinha(CONFIG.ABAS.FINANCEIRO_SAIDAS, {
        ID: gerarID(), PedidoID: '', Descricao: desc, Valor: valor.toFixed(2),
        Data: document.getElementById('s-data').value,
        Categoria: document.getElementById('s-categoria').value
      });
      todasSaidas = await lerAba(CONFIG.ABAS.FINANCEIRO_SAIDAS);
      toast('Gasto registrado!');
      fecharSheet('sheet-saida');
      renderMes();
    } catch(e) { toast('Erro ao registrar', 'erro'); }
    finally { loading(false); }
  }

  function abaAtiva(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
    document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
    if (el) el.classList.add('ativo');
    document.getElementById('aba-' + id).classList.add('ativa');
  }

  function abrirSheet(id) { document.getElementById(id).classList.add('aberto'); }
  function fecharSheet(id) { document.getElementById(id).classList.remove('aberto'); }
  document.querySelectorAll('.sheet-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('aberto'); });
  });
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
</body>
</html>
